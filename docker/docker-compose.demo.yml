name: aft_public_software_demo

networks:
  aft_public_software:
    name: aft_public_software
    driver: bridge

services:
  aft_public_software_site:
    image: nginx:alpine
    container_name: aft_public_software_site
    restart: unless-stopped
    networks:
      - aft_public_software
    ports:
      - "8098:80"
    volumes:
      - ../site:/usr/share/nginx/html:ro
      - ./site.default.conf:/etc/nginx/conf.d/default.conf:ro

  aft_public_software_api:
    build:
      context: ../examples/api-demo
      dockerfile: Dockerfile
    image: aft-public-software-api:local
    container_name: aft_public_software_api
    restart: unless-stopped
    networks:
      - aft_public_software
    ports:
      - "8798:8790"
